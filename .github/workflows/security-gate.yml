name: Security Gate

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  security-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        # actions/setup-node v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint changed files
        run: npm run lint:changed

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: npm run build

      - name: Setup Deno
        # Pinned to the immutable commit SHA of denoland/setup-deno v2.0.4.
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282
        with:
          # v1.46.3 matches the Supabase Edge Functions runtime the tests target.
          deno-version: v1.46.3

      - name: Deno tests (shared secure-random, no extra permissions)
        run: deno test supabase/functions/_shared/secure-random_test.ts

      - name: Deno tests (edge function auth helpers)
        run: deno test --allow-net --allow-env supabase/functions/tests/ai.test.ts

      - name: Deno tests (scheduled website publishing)
        run: deno test supabase/functions/publish-scheduled-content/index_test.ts

      - name: Dependency audit (public npm registry, fail-closed JSON parse)
        env:
          npm_config_registry: https://registry.npmjs.org/
        run: |
          # npm audit exits non-zero for vulnerabilities and transport errors.
          # Capture its output and let the validator decide whether to pass.
          set +e
          npm audit --omit=dev --json > audit.json
          audit_exit=$?
          set -e
          echo "npm audit exit code (informational only): $audit_exit"
          node --input-type=module -e "
            import { readFileSync } from 'node:fs';
            let raw;
            try { raw = readFileSync('audit.json', 'utf8'); }
            catch (e) { console.error('audit.json missing'); process.exit(1); }
            if (!raw.trim()) { console.error('audit.json is empty'); process.exit(1); }
            let data;
            try { data = JSON.parse(raw); }
            catch (e) { console.error('audit.json is not valid JSON:', e.message); process.exit(1); }
            if (data && data.error) {
              console.error('npm audit reported an error:', JSON.stringify(data.error));
              process.exit(1);
            }
            const sev = (data && data.metadata && data.metadata.vulnerabilities) || null;
            if (!sev || typeof sev !== 'object') {
              console.error('audit.json missing metadata.vulnerabilities');
              process.exit(1);
            }
            const high = Number(sev.high || 0);
            const critical = Number(sev.critical || 0);
            console.log('Vulnerability summary:', JSON.stringify(sev));
            if (high > 0 || critical > 0) {
              console.error('Blocking: high=' + high + ' critical=' + critical);
              process.exit(1);
            }
          "

      - name: Reject committed private environment files
        run: |
          if find . -type f -name '.env*' ! -name '*.example' ! -path './node_modules/*' | grep -q .; then
            echo 'Private environment file detected in the repository.'
            exit 1
          fi
