name: Security Gate

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint changed files
        run: npm run lint:changed

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: Reject committed private environment files
        run: |
          if find . -type f -name '.env*' ! -name '*.example' ! -path './node_modules/*' | grep -q .; then
            echo 'Private environment file detected in the repository.'
            exit 1
          fi
