name: Deploy GitHub Pages

"on":
  workflow_run:
    workflows: ["Security Gate"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  checks: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch' &&
       github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Resolve deploy commit
        id: commit
        env:
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
          DISPATCH_SHA: ${{ github.sha }}
        run: echo "sha=${WORKFLOW_SHA:-$DISPATCH_SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout validated commit
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ steps.commit.outputs.sha }}
          fetch-depth: 1

      - name: Verify Security Gate result
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_SHA: ${{ steps.commit.outputs.sha }}
        run: |
          conclusion="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/commits/${DEPLOY_SHA}/check-runs" \
            --jq '.check_runs[] | select(.name == "security-and-type-check") | .conclusion' \
            | head -n 1)"
          if [ "$conclusion" != "success" ]; then
            echo "Security Gate is not successful for ${DEPLOY_SHA}."
            exit 1
          fi

      - name: Setup Node.js
        # actions/setup-node v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          cache: "npm"

      - name: Configure GitHub Pages
        # actions/configure-pages v6.0.0
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d

      - name: Install dependencies
        run: npm ci

      - name: Build production site
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: npm run build

      - name: Prepare and validate Pages artifact
        run: |
          cp dist/index.html dist/404.html
          routes=(
            services
            services/rawatan-umum
            services/sakit-tekak-selsema-demam
            services/ujian-pantas
            services/nebulizer
            services/sedutan-kahak
            services/pencucian-hidung
            services/penjagaan-telinga
            services/khatan
            services/ketumbuhan-ketuat
            services/ujian-darah-penuh
            services/ujian-denggi
            services/pemeriksaan-kesihatan
            services/pemeriksaan-darah
            services/pemeriksaan-pelajar
            services/pemeriksaan-pra-pekerjaan
            services/pemeriksaan-kembali-bekerja
            services/pemeriksaan-haji-2026
            services/prosedur-kecil
            doctors
            doctor-on-duty
            appointment
            gallery
            health-tips
            pages
            auth
            locum-register
            reset-password
            video-call
            video-call/staff
            tv
            editor
            editor/home
            editor/pages
            editor/posts
            editor/posts/new
            editor/media
            editor/services
            editor/team
            editor/blog
            editor/gallery
            editor/reviews
            editor/navigation
            editor/analytics
            editor/profile
            staff
            clinic
            clinic/queue
            clinic/appointments
            clinic/video-calls
            clinic/patients
            clinic/consultation
            clinic/dispensary
            clinic/procurement
            clinic/procurement-dashboard
            clinic/seasonal-forecast
            clinic/billings
            clinic/panel-claims
            clinic/receivables
            clinic/inventory
            clinic/inventory/restock-review
            clinic/owe-slips
            clinic/insight
            clinic/settings
            clinic/settings/clinic-profile
            clinic/settings/preferences
            clinic/settings/users
            clinic/settings/locum-registration
            clinic/settings/inventory
            clinic/settings/diagnoses
            clinic/settings/panels
            clinic/settings/drug-label
            clinic/settings/documents
            clinic/settings/document-templates
            clinic/settings/charges
            clinic/settings/queue
            clinic/settings/procurement-rules
            clinic/voided
            clinic
            admin
          )
          for route in "${routes[@]}"; do
            mkdir -p "dist/${route}"
            cp dist/index.html "dist/${route}/index.html"
          done
          test -f dist/index.html
          test -f dist/404.html
          test -f dist/services/index.html
          test -f dist/editor/index.html
          test -f dist/CNAME
          test "$(cat dist/CNAME)" = "klinikawfa.com"
          # The clinic background intentionally lives under public/ so the CMS
          # can store one stable URL instead of a build-specific asset hash.
          test -f dist/klinik-awfa-exterior.webp
          if find dist -type f -name '.env*' | grep -q .; then
            echo "Private environment file found in Pages artifact."
            exit 1
          fi
          if find dist -type f -name '*.map' | grep -q .; then
            echo "Source map found in Pages artifact."
            exit 1
          fi
          if grep -R -E \
            'SUPABASE_SERVICE_ROLE_KEY|SUPABASE_DB_URL|STRIPE_SECRET_KEY|STRIPE_WEBHOOK_SECRET' \
            dist; then
            echo "Server-only secret name found in Pages artifact."
            exit 1
          fi

      - name: Upload Pages artifact
        # actions/upload-pages-artifact v5.0.0
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: ./dist

      - name: Deploy GitHub Pages
        id: deployment
        # actions/deploy-pages v5.0.0
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
